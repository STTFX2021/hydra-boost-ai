<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HydrAI Labs | Automatización IA para Negocios Locales</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://hydrailabs.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Description / Author -->
    <meta
      name="description"
      content="HydrAI Labs — Agencia de automatización con IA para negocios locales en España. Chatbots 24/7, webs SEO y automatizaciones que captan clientes mientras duermes. Desde 197€."
    />
    <meta name="author" content="HydrAI Labs" />

    <!-- Preconnect / DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Preload critical image (logo in header) -->
    <link rel="preload" as="image" href="/favicon.png" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0B0F14" />

    <!-- Open Graph -->
    <meta property="og:title" content="HydrAI Labs — Automatización IA para negocios locales" />
    <meta
      property="og:description"
      content="Chatbots 24/7, webs SEO y automatizaciones que captan clientes mientras duermes. Desde 197€."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hydrailabs.com" />
    <meta property="og:image" content="https://hydrailabs.com/og-image.png" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@HydrAILabs" />
    <meta name="twitter:title" content="HydrAI Labs — Automatización IA para negocios locales" />
    <meta
      name="twitter:description"
      content="Chatbots 24/7, webs SEO y automatizaciones que captan clientes mientras duermes."
    />
    <meta name="twitter:image" content="https://hydrailabs.com/og-image.png" />

    <!-- Schema.org (Organization) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "HydrAI Labs",
        "description": "Agencia de automatización con IA para negocios locales en España",
        "url": "https://hydrailabs.com",
        "logo": "https://hydrailabs.com/favicon.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "sales",
          "availableLanguage": ["Spanish", "English"]
        },
        "areaServed": "ES",
        "serviceType": [
          "Chatbots con IA",
          "Automatización de procesos",
          "Desarrollo web",
          "Marketing digital"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
