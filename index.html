<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HydrAI Labs</title>

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Generic fallback meta, route-specific values are injected with react-helmet-async -->
    <meta name="description" content="HydrAI Labs" />
    <meta name="author" content="HydrAI Labs" />

    <!-- Preconnect / DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Preload critical image (logo in header) -->
    <link rel="preload" as="image" href="/favicon.png" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0B0F14" />

    <!-- Open Graph fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://hydrailabs.com/og-image.png" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://hydrailabs.com/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
